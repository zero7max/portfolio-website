<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<meta name="description" content="设计师个人作品集">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ===== Reset & Variables ===== */
:root{--bg:#0a0a0a;--bg-alt:#111;--text:#f0f0f0;--text2:#999;--text3:#666;--border:#2a2a2a;--fd:'Playfair Display',Georgia,serif;--ff:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;--mw:1200px;--nh:72px;--ease:.4s cubic-bezier(.4,0,.2,1)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:var(--nh)}
body{font-family:var(--ff);color:var(--text);background:var(--bg);line-height:1.7;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
ul{list-style:none}
.container{max-width:var(--mw);margin:0 auto;padding:0 28px}

/* ===== Navigation ===== */
.navbar{position:fixed;top:0;left:0;right:0;height:var(--nh);z-index:1000;transition:var(--ease)}
.navbar.scrolled{background:rgba(10,10,10,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06)}
.nav-container{max-width:var(--mw);margin:0 auto;padding:0 28px;height:100%;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-size:20px;font-weight:300;letter-spacing:4px;text-transform:uppercase;color:var(--text)}
.nav-menu{display:flex;gap:36px}
.nav-link{font-size:12px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--text2);cursor:pointer;transition:var(--ease);position:relative;background:none;border:none;font-family:inherit;padding:0}
.nav-link::after{content:'';position:absolute;bottom:-6px;left:0;width:0;height:1px;background:var(--text);transition:width .4s ease}
.nav-link:hover,.nav-link.active{color:var(--text)}
.nav-link.active::after,.nav-link:hover::after{width:100%}
.nav-toggle{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
.nav-toggle span{display:block;width:24px;height:1.5px;background:var(--text);border-radius:1px;transition:var(--ease)}
.nav-toggle.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.nav-toggle.active span:nth-child(2){opacity:0}
.nav-toggle.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

/* ===== Page Switching ===== */
.page{display:none;animation:pageIn .5s ease forwards}
.page.active{display:block}
@keyframes pageIn{from{opacity:0}to{opacity:1}}

/* ===== Hero ===== */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(135deg,#050505,#0d0d0d 40%,#111);overflow:hidden}
.hero-overlay{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(255,255,255,.03) 0%,transparent 60%),radial-gradient(ellipse at 70% 60%,rgba(255,255,255,.02) 0%,transparent 50%);pointer-events:none}
.hero-texture{position:absolute;inset:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.hero-content{position:relative;z-index:1;padding:0 28px;animation:heroFade 1.2s ease forwards}
.hero-subtitle{font-size:12px;font-weight:400;letter-spacing:4px;text-transform:uppercase;color:var(--text2);margin-bottom:24px}
.hero-title{font-family:var(--fd);font-size:clamp(40px,8vw,80px);font-weight:700;line-height:1.08;color:#fff;margin-bottom:24px;letter-spacing:-1px}
.hero-desc{font-size:16px;font-weight:300;color:rgba(255,255,255,.45);margin-bottom:44px;letter-spacing:1px}
@keyframes heroFade{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

/* ===== About ===== */
.about{padding:100px 0;background:var(--bg-alt)}
.about-inner{display:grid;grid-template-columns:200px 1fr;gap:50px;align-items:center;max-width:800px;margin:0 auto}
.about-avatar{overflow:hidden;border:1px solid var(--border)}
.about-avatar img{width:100%;aspect-ratio:1;object-fit:cover;filter:grayscale(1)}
.about-text h3{font-family:var(--fd);font-size:26px;font-weight:600;margin-bottom:12px}
.about-text p{color:var(--text2);font-size:14px;line-height:1.9;font-weight:300}

/* ===== Contact ===== */
.contact{padding:80px 0}
.contact-title{text-align:center;font-family:var(--fd);font-size:28px;margin-bottom:40px}
.contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:600px;margin:0 auto}
.contact-card{display:flex;flex-direction:column;align-items:center;text-align:center;padding:36px 20px;border:1px solid var(--border);transition:var(--ease)}
.contact-card:hover{border-color:rgba(255,255,255,.3);background:var(--bg-alt)}
.contact-card i{font-size:28px;color:var(--text2);margin-bottom:12px;transition:var(--ease)}
.contact-card:hover i{color:var(--text)}
.contact-card h4{font-size:13px;font-weight:400;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.contact-card p{font-size:12px;color:var(--text2)}

/* ===== Page Section Header ===== */
.section{padding:100px 0}
.section-header{text-align:center;margin-bottom:48px}
.section-tag{font-size:11px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--text2)}
.section-title{font-family:var(--fd);font-size:clamp(28px,4vw,40px);font-weight:700;color:var(--text);margin-top:8px}
.section-desc{font-size:14px;color:var(--text2);max-width:500px;margin:8px auto 0;font-weight:300}

/* ===== Project Grid (2x2) ===== */
.project-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;position:relative}
.project-card{position:relative;border-radius:8px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:opacity .4s ease,transform .4s ease;background:var(--bg-alt)}
.project-card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.15)}
.project-card .card-cover{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.project-card .card-tag{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.65);color:#fff;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:4px;font-weight:500;backdrop-filter:blur(4px)}
.project-card .card-body{padding:16px 20px 20px}
.project-card .card-body h3{font-size:15px;font-weight:600;color:#fff;margin-bottom:4px}
.project-card .card-body p{font-size:12px;color:var(--text2);font-weight:300}
.project-card.dimmed{opacity:.12;pointer-events:none;transform:scale(.96)}
.project-card.hidden{display:none}
.project-load-more{text-align:center;margin-top:40px}

/* ===== Filter Tags ===== */
.project-filter{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-top:48px}
.project-filter .tag-btn{padding:6px 16px;font-size:11px;font-weight:400;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:var(--ease);font-family:var(--ff)}
.project-filter .tag-btn:hover{border-color:var(--text2);color:var(--text)}
.project-filter .tag-btn.active{background:#fff;color:#0a0a0a;border-color:#fff}

/* ===== Expand Overlay ===== */
.expand-overlay{position:fixed;z-index:500;background:var(--bg);border:1px solid rgba(255,255,255,.08);border-radius:8px;overflow:hidden;transition:all .4s cubic-bezier(.4,0,.2,1);box-shadow:0 20px 80px rgba(0,0,0,.6)}
.expand-overlay.full{top:0!important;left:0!important;width:100vw!important;height:100vh!important;border-radius:0!important;border:none!important}
.expand-scroll{height:100%;overflow-y:auto;padding:0;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.expand-scroll::-webkit-scrollbar{width:4px}
.expand-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.expand-inner{opacity:0;transition:opacity .35s ease;padding:0}
.expand-inner.show{opacity:1}
.expand-close{position:fixed;top:20px;right:24px;z-index:10;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.5);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--ease);backdrop-filter:blur(8px);opacity:0;pointer-events:none}
.expand-close.show{opacity:1;pointer-events:auto}
.expand-close:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4);transform:scale(1.08)}
/* expanded content layout */
.expand-wrap{max-width:900px;margin:0 auto;padding:80px 28px 60px}
.expand-wrap .exp-cover{width:100%;border-radius:8px;aspect-ratio:16/9;object-fit:cover;margin-bottom:28px}
.expand-wrap .exp-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.expand-wrap .exp-tags span{font-size:11px;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--border);color:var(--text2);padding:4px 12px}
.expand-wrap .exp-title{font-family:var(--fd);font-size:clamp(22px,3vw,32px);font-weight:700;color:#fff;margin-bottom:12px}
.expand-wrap .exp-desc{font-size:14px;color:var(--text2);font-weight:300;line-height:1.8;margin-bottom:32px}
.expand-wrap .exp-video{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:4px;overflow:hidden}
.expand-wrap .exp-video iframe{position:absolute;inset:0;width:100%;height:100%;border:none}

/* ===== Footer ===== */
.footer{padding:40px 0;border-top:1px solid rgba(255,255,255,.06);text-align:center;margin-top:40px}
.footer p{font-size:12px;color:var(--text3);letter-spacing:1px;font-weight:300}

/* ===== Responsive ===== */
@media(max-width:768px){
    .nav-menu{position:fixed;top:var(--nh);left:0;right:0;background:rgba(10,10,10,.95);backdrop-filter:blur(20px);flex-direction:column;gap:0;padding:0;max-height:0;overflow:hidden;transition:max-height .4s ease;border-bottom:1px solid rgba(255,255,255,.06)}
    .nav-menu.open{max-height:300px}
    .nav-menu li{width:100%}
    .nav-link{display:block;padding:18px 28px;border-bottom:1px solid rgba(255,255,255,.04);letter-spacing:2px}
    .nav-link::after{display:none}
    .nav-toggle{display:flex}
    .about-inner{grid-template-columns:1fr;text-align:center}
    .about-avatar{max-width:160px;margin:0 auto}
    .project-grid{grid-template-columns:1fr;gap:16px}
    .expand-wrap{padding:70px 16px 40px}
    .expand-close{top:16px;right:16px;width:36px;height:36px}
    .contact-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:480px){
    .contact-grid{grid-template-columns:1fr}
    .hero-title{font-size:34px}
    .project-grid{gap:12px}
}
</style>
</head>

/* ================================================
   Render Projects
   ================================================ */
const PAGE_SIZE = 4; // 2x2

function renderProjects(gridId, loadMoreId, filterId, data) {
    const grid = document.getElementById(gridId);
    const loadMore = document.getElementById(loadMoreId);
    const filterEl = document.getElementById(filterId);
    let currentFilter = 'all';
    let currentPage = 1;

    function visibleData() {
        return currentFilter === 'all' ? data : data.filter(d => d.cat === currentFilter);
    }

    function collectTags() {
        const set = new Set();
        data.forEach(d => d.tags.forEach(t => set.add(t)));
        return Array.from(set);
    }

    function render(page, append) {
        const filtered = visibleData();
        const end = page * PAGE_SIZE;
        const items = filtered.slice(0, end);
        if (!append) grid.innerHTML = '';
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'project-card';
            div.dataset.id = item.id;
            div.innerHTML = `
                <img class="card-cover" src="${item.cover}" alt="${item.title}" loading="lazy">
                <span class="card-tag">${item.tags[0]}</span>
                <div class="card-body">
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                </div>
            `;
            div.addEventListener('click', () => expandCard(div, item, data));
            grid.appendChild(div);
        });
        loadMore.style.display = end >= filtered.length ? 'none' : '';
    }

    // Build filter tags
    const allTags = collectTags();
    filterEl.innerHTML = '<button class="tag-btn active" data-tag="all">全部</button>';
    allTags.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'tag-btn';
        btn.dataset.tag = t;
        btn.textContent = t;
        filterEl.appendChild(btn);
    });

    filterEl.addEventListener('click', e => {
        const btn = e.target.closest('.tag-btn');
        if (!btn) return;
        filterEl.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.tag;
        currentPage = 1;
        render(1);
    });

    loadMore.addEventListener('click', () => {
        currentPage++;
        render(currentPage, true);
    });

    render(1);
}

/* ================================================
   Card Expand / Collapse
   ================================================ */
let expandState = null; // { card, overlay, rect, data }

function expandCard(cardEl, project, allData) {
    if (expandState) return; // already expanded

    const rect = cardEl.getBoundingClientRect();
    const overlay = document.createElement('div');
    overlay.className = 'expand-overlay';
    overlay.style.cssText = `top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;height:${rect.height}px;`;

    overlay.innerHTML = `
        <button class="expand-close"><i class="fas fa-chevron-down"></i></button>
        <div class="expand-scroll">
            <div class="expand-inner">
                <div class="expand-wrap">
                    <img class="exp-cover" src="${project.cover}" alt="${project.title}">
                    <div class="exp-tags">${project.tags.map(t => `<span>${t}</span>`).join('')}</div>
                    <h2 class="exp-title">${project.title}</h2>
                    <p class="exp-desc">${project.detail}</p>
                    <div class="exp-video">
                        <iframe src="//player.bilibili.com/player.html?isOutside=true&bvid=${project.bvid}" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true" loading="lazy"></iframe>
                    </div>
                </div>
            </div>
        </div>
    `;

    document.body.appendChild(overlay);

    // Dim other cards
    const siblings = cardEl.parentElement.querySelectorAll('.project-card');
    siblings.forEach(c => { if (c !== cardEl) c.classList.add('dimmed'); });
    cardEl.style.opacity = '0';
    cardEl.style.pointerEvents = 'none';

    // Disable body scroll
    document.body.style.overflow = 'hidden';

    expandState = { cardEl, overlay, container: cardEl.parentElement };

    // Animate to full screen
    requestAnimationFrame(() => {
        overlay.classList.add('full');
    });

    // Show inner content + close button after expand
    setTimeout(() => {
        overlay.querySelector('.expand-inner').classList.add('show');
        overlay.querySelector('.expand-close').classList.add('show');
    }, 350);

    // Close on overlay background click
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeExpand();
    });

    // Close button: direct handler
    const closeBtn = overlay.querySelector('.expand-close');
    closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        closeExpand();
    });

    // ESC to close
    const escHandler = (e) => { if (e.key === 'Escape') closeExpand(); };
    document.addEventListener('keydown', escHandler);
    expandState._escHandler = escHandler;
}

function closeExpand() {
    if (!expandState) return;
    const { cardEl, overlay, container } = expandState;

    // Hide inner content
    overlay.querySelector('.expand-inner').classList.remove('show');

    // Remove full class to animate back
    setTimeout(() => {
        overlay.classList.remove('full');

        // After animation complete, clean up
        setTimeout(() => {
            overlay.remove();
            const siblings = container.querySelectorAll('.project-card');
            siblings.forEach(c => { c.classList.remove('dimmed'); c.style.opacity = ''; c.style.pointerEvents = ''; });
            document.body.style.overflow = '';
            if (expandState._escHandler) document.removeEventListener('keydown', expandState._escHandler);
            expandState = null;
        }, 420);
    }, 200);
}

/* ================================================
   SPA Page Switching
   ================================================ */
const navLinks = document.querySelectorAll('.nav-link[data-page]');
const pages = {
    home: document.getElementById('page-home'),
    works: document.getElementById('page-works'),
    tech: document.getElementById('page-tech')
};
let rendered = { works: false, tech: false };

function switchPage(pageId) {
    // Close any expanded card
    if (expandState) closeExpand();
    // Hide all pages
    Object.values(pages).forEach(p => p.classList.remove('active'));
    pages[pageId].classList.add('active');
    navLinks.forEach(l => l.classList.remove('active'));
    document.querySelector('.nav-link[data-page="' + pageId + '"]')?.classList.add('active');
    document.getElementById('navToggle').classList.remove('active');
    document.getElementById('navMenu').classList.remove('open');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    // Lazy render
    if (pageId === 'works' && !rendered.works) {
        rendered.works = true;
        renderProjects('worksGrid', 'worksLoadMore', 'worksFilter', worksProjects);
    }
    if (pageId === 'tech' && !rendered.tech) {
        rendered.tech = true;
        renderProjects('techGrid', 'techLoadMore', 'techFilter', techProjects);
    }
}

navLinks.forEach(link => link.addEventListener('click', () => switchPage(link.dataset.page)));

window.addEventListener('scroll', () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 80);
});

document.getElementById('navToggle').addEventListener('click', () => {
    document.getElementById('navToggle').classList.toggle('active');
    document.getElementById('navMenu').classList.toggle('open');
});
</script>
